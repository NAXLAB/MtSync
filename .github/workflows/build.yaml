name: Build Packages

on:
  push:
    branches:
      - build

jobs:
  # ── DEB ────────────────────────────────────────────────────────────────────
  build-deb:
    name: Build DEB (Ubuntu ${{ matrix.ubuntu }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ['24.04', '25.10', '26.04']
    container:
      image: ubuntu:${{ matrix.ubuntu }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            cmake g++ pkg-config \
            libgtkmm-4.0-dev \
            libadwaita-1-dev \
            libsoup-3.0-dev \
            libcairo2-dev \
            nlohmann-json3-dev
          apt-get clean
          rm -rf /var/lib/apt/lists/*

      - name: Cache bundled rclone
        uses: actions/cache@v4
        with:
          path: build/rclone-bundled
          key: rclone-1.74.0-${{ runner.arch }}

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Package
        run: |
          cd build && cpack -G DEB
          mv *.deb mtsync_$(grep -oP '(?<=VERSION )\d+\.\d+\.\d+' ../CMakeLists.txt | head -1)_ubuntu${{ matrix.ubuntu }}_$(uname -m).deb

      - uses: actions/upload-artifact@v4
        with:
          name: mtsync-deb-ubuntu-${{ matrix.ubuntu }}
          path: build/*.deb

  # ── RPM ────────────────────────────────────────────────────────────────────
  build-rpm:
    name: Build RPM
    runs-on: ubuntu-24.04
    container:
      image: fedora:41
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            cmake gcc-c++ pkg-config \
            gtkmm4.0-devel \
            libadwaita-devel \
            libsoup3-devel \
            cairo-devel \
            nlohmann-json-devel \
            rpm-build

      - name: Cache bundled rclone
        uses: actions/cache@v4
        with:
          path: build/rclone-bundled
          key: rclone-1.74.0-${{ runner.arch }}

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Package
        run: |
          cd build && cpack -G RPM
          mv *.rpm mtsync_$(grep -oP '(?<=VERSION )\d+\.\d+\.\d+' ../CMakeLists.txt | head -1)_$(. /etc/os-release && echo ${ID}${VERSION_ID})_$(uname -m).rpm

      - uses: actions/upload-artifact@v4
        with:
          name: mtsync-rpm
          path: build/*.rpm

  # ── AppImage ───────────────────────────────────────────────────────────────
  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake g++ pkg-config \
            libgtkmm-4.0-dev \
            libadwaita-1-dev \
            libsoup-3.0-dev \
            libcairo2-dev \
            nlohmann-json3-dev \
            libfuse2
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Cache bundled rclone
        uses: actions/cache@v4
        with:
          path: build/rclone-bundled
          key: rclone-1.74.0-${{ runner.arch }}

      - name: Configure and build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build --parallel $(nproc)

      - name: Install to AppDir
        run: DESTDIR=$(pwd)/AppDir cmake --install build

      - name: Download linuxdeploy
        run: |
          wget -q -O linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-gtk.sh \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy linuxdeploy-plugin-gtk.sh

      - name: Get version
        id: version
        run: echo "version=$(grep -oP '(?<=VERSION )\d+\.\d+\.\d+' CMakeLists.txt | head -1)" >> $GITHUB_OUTPUT

      - name: Create AppImage
        env:
          DEPLOY_GTK_VERSION: 4
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ./linuxdeploy \
            --appdir AppDir \
            --plugin gtk \
            --output appimage
          mv *.AppImage mtsync_${VERSION}_$(uname -m).AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: mtsync-appimage
          path: "*.AppImage"

  # ── Flatpak ────────────────────────────────────────────────────────────────
  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub org.gnome.Platform/x86_64/48 org.gnome.Sdk/x86_64/48

      - name: Get version
        id: version
        run: echo "version=$(grep -oP '(?<=VERSION )\d+\.\d+\.\d+' CMakeLists.txt | head -1)" >> $GITHUB_OUTPUT

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: mtsync_${{ steps.version.outputs.version }}_x86_64.flatpak
          manifest-path: packaging/com.mtsync.MtSync.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - uses: actions/upload-artifact@v4
        with:
          name: mtsync-flatpak
          path: mtsync_${{ steps.version.outputs.version }}_x86_64.flatpak

  # ── Snap ───────────────────────────────────────────────────────────────────
  build-snap:
    name: Build Snap
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: snapcore/action-build@v1

      - uses: actions/upload-artifact@v4
        with:
          name: mtsync-snap
          path: "*.snap"
