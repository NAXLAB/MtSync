name: mtsync
version: '0.8.4'
summary: GTK4 frontend to rclone
description: |
  Mount network storage in comfort. Mt. Sync is a GTK4/libadwaita
  frontend to rclone for managing remote storage, sync jobs,
  and mounts from a native GNOME desktop application.

base: core24
grade: devel
confinement: strict

slots:
  dbus-mtsync:
    interface: dbus
    bus: session
    name: com.mtsync.MtSync
  dbus-mtsync-daemon:
    interface: dbus
    bus: session
    name: com.mtsync.Daemon

plugs:
  dot-config-autostart:
    interface: personal-files
    write:
      - $HOME/.config/autostart

parts:
  mtsync:
    plugin: cmake
    source: .
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/usr
    build-packages:
      - libgtkmm-4.0-dev
      - libadwaita-1-dev
      - libsoup-3.0-dev
      - libcairo2-dev
      - nlohmann-json3-dev
      - pkg-config
      - gtk-update-icon-cache
    override-prime: |
      craftctl default
      gtk-update-icon-cache -t -q usr/share/icons/hicolor
      mkdir -p meta/gui
      cp usr/share/icons/hicolor/256x256/apps/com.mtsync.MtSync.png meta/gui/icon.png

  rclone:
    plugin: dump
    source: https://github.com/rclone/rclone/releases/download/v1.68.2/rclone-v1.68.2-linux-amd64.zip
    source-type: zip
    organize:
      rclone-v1.68.2-linux-amd64/rclone: usr/bin/rclone
    prime:
      - usr/bin/rclone

apps:
  mtsync:
    command: usr/bin/mtsync
    extensions: [gnome]
    desktop: usr/share/applications/com.mtsync.MtSync.desktop
    slots:
      - dbus-mtsync
      - dbus-mtsync-daemon
    plugs:
      - network
      - home
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - dot-config-autostart
